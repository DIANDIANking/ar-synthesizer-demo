<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Mini Synth Workstation</title>
  <!-- A-Frame + AR.js 必须在 module 之前加载 -->
  <script src="./assets/aframe.min.js?v=20260529-arjs-v1"></script>
  <script src="./assets/aframe-ar.js?v=20260529-arjs-v1"></script>
  <style>
    /* ===== 基础重置 ===== */
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #000;
    }

    /* ===== 启动覆盖层 ===== */
    .welcome-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(25px) saturate(1.8);
      -webkit-backdrop-filter: blur(25px) saturate(1.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .welcome-overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.3) 0%, transparent 50%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      z-index: -1;
    }

    .welcome-overlay.hidden {
      display: none;
    }

    .welcome-title {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
      font-weight: 700;
    }

    .welcome-subtitle {
      font-size: 1.2em;
      opacity: 0.85;
      margin-bottom: 30px;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.3);
    }

    .start-button {
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      color: white;
      padding: 20px 50px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .start-button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-3px) scale(1.02);
    }

    .start-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      pointer-events: none;
    }

    /* ===== AR 场景 ===== */
    #ar-scene {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #ar-scene.active {
      display: block;
    }

    /* ===== HUD ===== */
    .stage-hud {
      position: fixed;
      z-index: 10;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .mode-play .stage-hud {
      opacity: 0.22;
    }

    .mode-play .stage-hud:hover,
    .mode-play .stage-hud:focus-within {
      opacity: 1;
    }

    .small-btn {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      color: #101010;
      background: #f7c24d;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== 提示文字 ===== */
    .stage-prompt {
      position: fixed;
      z-index: 10;
      left: 50%;
      bottom: 28px;
      min-width: 104px;
      padding: 10px 18px;
      border: 1px solid rgba(99, 230, 190, 0.34);
      border-radius: 8px;
      color: #eafff6;
      background: rgba(7, 13, 13, 0.62);
      box-shadow: 0 0 24px rgba(99, 230, 190, 0.20);
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .mode-play .stage-prompt {
      opacity: 0;
      transform: translateX(-50%) translateY(10px) scale(0.96);
    }

    /* ===== 调试面板 ===== */
    .ar-debug-panel {
      position: fixed;
      z-index: 38;
      right: 10px;
      top: 10px;
      width: min(360px, calc(100vw - 20px));
      max-height: 46vh;
      overflow: auto;
      padding: 10px 12px;
      border: 1px solid rgba(99, 230, 190, 0.45);
      border-radius: 8px;
      color: #dcfff4;
      background: rgba(2, 7, 9, 0.78);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.45);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.42;
      pointer-events: none;
    }

    .ar-debug-panel b {
      color: #f7c24d;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      .welcome-title { font-size: 2em; }
      .welcome-subtitle { font-size: 1em; }
    }
  </style>
</head>
<body>

  <!-- 启动覆盖层 -->
  <div id="welcome-overlay" class="welcome-overlay">
    <div class="welcome-title">AR Mini Synth Workstation</div>
    <div class="welcome-subtitle">对准乐器卡，AR 乐器实时叠加</div>
    <button id="start-ar" class="start-button" type="button">✨ 启动 AR 体验</button>
    <div style="margin-top: 30px; font-size: 0.85em; opacity: 0.7; max-width: 320px; line-height: 1.6;">
      💡 提示：请允许摄像头权限<br>将合成器/鼓机卡片对准镜头
    </div>
  </div>

  <!-- HUD -->
  <div class="stage-hud" id="stage-hud">
    <button class="small-btn" id="reset-view" type="button">重置视角</button>
  </div>

  <!-- 提示 -->
  <div class="stage-prompt" id="stage-prompt">请点击启动</div>

  <!-- 调试面板 -->
  <div class="ar-debug-panel" id="ar-debug-panel" aria-label="AR 调试信息"></div>

  <!-- AR 场景 -->
  <a-scene
    id="ar-scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5; labelingMode: black_region;">

    <a-marker id="marker-synth" type="pattern" url="./assets/markers/synth.patt"
              instrument-marker="instrument: synth"></a-marker>

    <a-marker id="marker-drum" type="pattern" url="./assets/markers/drum.patt"
              instrument-marker="instrument: drum"></a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script type="module" src="./assets/app.js?v=20260529-arjs-v1"></script>
</body>
</html>
